<!DOCTYPE html>
<html>
<head>
    <title>Map App</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* MAP */
        #map {
            height: 100vh;
            width: 100%;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: absolute;
            top: 100px;
            left: 20px;
            width: 220px;
            max-height: 70vh;
            overflow-y: auto;

            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(10px);

            border-radius: 16px;
            padding: 12px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 1000;
        }

        .category-item {
            padding: 10px 12px;
            margin: 6px 0;
            border-radius: 12px;
            cursor: pointer;

            background: rgba(0,0,0,0.05);
            transition: 0.2s;
            font-size: 14px;
            font-weight: 500;
        }

        .category-item:hover {
            background: rgba(0,0,0,0.12);
            transform: scale(1.02);
        }

        /* ===== INFO CARD ===== */
        .info-card {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;

            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);

            border-radius: 18px;
            padding: 16px;

            box-shadow: 0 12px 35px rgba(0,0,0,0.2);
            z-index: 1000;

            display: none;

            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .info-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .info-desc {
            font-size: 13px;
            color: #555;
            margin-bottom: 8px;
        }

        .info-group {
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
        }

        /* BUTTON */
        .btn-directions {
            width: 100%;
            padding: 10px;

            border: none;
            border-radius: 12px;

            background: linear-gradient(135deg, #000, #333);
            color: white;

            font-weight: 600;
            cursor: pointer;
        }

        /* PIN LABEL */
        .pin-label {
            background: rgba(255,255,255,0.9);
            padding: 4px 10px;
            border-radius: 12px;

            font-size: 12px;
            font-weight: 600;

            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            white-space: nowrap;
        }

        /* ADD BUTTON */
        .add-pin-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;

            z-index: 1000;

            padding: 12px 16px;
            border-radius: 12px;
            border: none;

            background: #000;
            color: white;
            font-weight: bold;

            cursor: pointer;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;

            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(6px);

            z-index: 2000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);

            padding: 20px;
            border-radius: 18px;

            width: 320px;

            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        }

        .modal-content h3 {
            margin-bottom: 12px;
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            margin: 8px 0;
            padding: 8px;
        }

        .modal-content button {
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        .save-btn {
            background: black;
            color: white;
        }

        .cancel-btn {
            background: #ddd;
        }

    </style>
</head>

<body>
    
<div id="ui-container">

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar"></div>

    <!-- MAP -->
    <div id="map"></div>

    <!-- INFO CARD -->
    <div id="infoCard" class="info-card">
        <div class="info-title" id="cardTitle"></div>
        <div class="info-desc" id="cardDesc"></div>
        <div class="info-group" id="cardGroup"></div>

        <button id="directionBtn" class="btn-directions">
            🧭 Get Directions
        </button>
    </div>

    <!-- ADD BUTTON -->
    <button id="addPinBtn" class="add-pin-btn">
        ➕ Add Pin
    </button>

    <!-- MODAL -->
    <div id="addPinModal" class="modal">
        <div class="modal-content">

            <h3>Add New Pin</h3>

            <input id="newPinName" placeholder="Name" />
            <textarea id="newPinDesc" placeholder="Description"></textarea>

            <select id="newPinCategory"></select>

            <button class="save-btn" onclick="savePin()">Save Pin</button>
            <button class="cancel-btn" onclick="closeModal()">Cancel</button>

        </div>
    </div>
</div>


<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
